# ─────────────────────────────────────────────────────────────────────────────
# AuthSec — on-premise monolith stack
#
# Services:
#   authsec        – Go monolith (port 7468), replaces 9 former microservices
#   postgres       – PostgreSQL 15 (master DB + dynamic tenant DBs)
#   hydra          – Ory Hydra OAuth2/OIDC server
#   hydra-migrate  – one-shot Hydra schema migration job
#   redis          – session cache & rate limiting
#   vault          – HashiCorp Vault (dev mode, OIDC credential storage)
#   vault-init     – one-shot: enables kv-v2 secrets engine
#   ui             – React frontend (all user-facing flows)
#   nginx          – reverse proxy / TLS termination
#
# Optional add-ons (not included by default):
#   vault          – see vault/ directory for config
#   spire-headless – AI agent SPIFFE workload identity (port 7001)
#
# Quick start:
#   cp .env.example .env && $EDITOR .env   # fill in secrets
#   docker compose up -d
#   # Wait for all services to be healthy, then:
#   curl -X POST http://localhost/authsec/migration/migrations/master/run
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── AuthSec monolith ────────────────────────────────────────────────────────
  authsec:
    image: docker-repo-public.authsec.ai/authsec:latest
    # Uncomment to build locally (requires private Go modules to be vendored):
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: authsec
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      hydra:
        condition: service_healthy
      hydra-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:7468:7468"
    environment:
      # ── Server ──────────────────────────────────────────────────────────────
      PORT: "7468"
      GIN_MODE: ${GIN_MODE:-debug}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-development}

      # ── Primary PostgreSQL ───────────────────────────────────────────────────
      # PG user must have CREATEDB — tenant databases are created at runtime.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-kloudone_db}
      DB_USER: ${DB_USER:-authsec}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA:-public}

      # ── JWT / Token secrets (REQUIRED — use 32+ random chars each) ──────────
      JWT_DEF_SECRET: ${JWT_DEF_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_SDK_SECRET: ${JWT_SDK_SECRET}

      # ── Encryption keys ──────────────────────────────────────────────────────
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      SYNC_CONFIG_ENCRYPTION_KEY: ${SYNC_CONFIG_ENCRYPTION_KEY}

      # ── Service URLs ─────────────────────────────────────────────────────────
      # NOTE: OOC_MANAGER_URL and AUTH_MANAGER_URL point back to authsec itself.
      # In the monolith these modules are merged — internal calls are in-process.
      HYDRA_ADMIN_URL: http://hydra:4445
      HYDRA_PUBLIC_URL: http://hydra:4444
      OOC_MANAGER_URL: http://authsec:7468
      AUTH_MANAGER_URL: http://authsec:7468
      REDIS_URL: redis://redis:6379
      ICP_SERVICE_URL: ${ICP_SERVICE_URL:-http://localhost:7001}
      BASE_URL: ${BASE_URL:-http://localhost}
      REACT_APP_URL: ${REACT_APP_URL:-http://localhost:3000}
      IDENTITY_PROVIDER_URL: ${IDENTITY_PROVIDER_URL:-http://localhost:3000}

      # ── CORS & tenant ────────────────────────────────────────────────────────
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:3000,http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOW_ORIGIN:-http://localhost:3000,http://localhost:5173}
      CORS_ALLOWED_METHODS: "GET, POST, PUT, DELETE, OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type, Authorization, X-Requested-With, Accept, Origin, Cache-Control"
      TENANT_DOMAIN_SUFFIX: ${TENANT_DOMAIN_SUFFIX:-localhost}

      # ── WebAuthn (FIDO2 / Passkeys) ──────────────────────────────────────────
      WEBAUTHN_RP_NAME: ${DOMAIN:-localhost}
      WEBAUTHN_RP_ID: ${APP_DOMAIN:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost}
      WEBAUTHN_TIMEOUT: "60000"
      WEBAUTHN_DEBUG: "false"

      # ── SMTP ─────────────────────────────────────────────────────────────────
      SMTP_HOST: ${SMTP_HOST:-smtp.elasticemail.com}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # ── Auth gate ────────────────────────────────────────────────────────────
      AUTH_EXPECT_ISS: ${AUTH_EXPECT_ISS:-authsec-ai/auth-manager}
      AUTH_EXPECT_AUD: ${AUTH_EXPECT_AUD:-authsec}
      REQUIRE_SERVER_AUTH: ${REQUIRE_SERVER_AUTH:-false}

      # ── Session ──────────────────────────────────────────────────────────────
      SESSION_SECRET: ${SESSION_SECRET}

      # ── HashiCorp Vault ───────────────────────────────────────────────────────
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}

      # ── OIDC social providers (optional) ─────────────────────────────────────
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}

      # ── HubSpot (optional) ───────────────────────────────────────────────────
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}

      # ── SPIFFE / JWT-SVID OIDC (optional — AI agent identity delegation) ─────
      SPIFFE_OIDC_ISSUER: ${SPIFFE_OIDC_ISSUER:-}
      SPIFFE_JWKS_KEY_ID: ${SPIFFE_JWKS_KEY_ID:-}
      SPIFFE_RSA_PRIVATE_KEY_B64: ${SPIFFE_RSA_PRIVATE_KEY_B64:-}
      SPIFFE_TRUST_DOMAIN: ${SPIFFE_TRUST_DOMAIN:-}

      # ── Okta CIBA (optional) ─────────────────────────────────────────────────
      OKTA_DOMAIN: ${OKTA_DOMAIN:-}
      OKTA_CLIENT_ID: ${OKTA_CLIENT_ID:-}
      OKTA_CLIENT_SECRET: ${OKTA_CLIENT_SECRET:-}
      OKTA_ISSUER: ${OKTA_ISSUER:-}
      OKTA_API_TOKEN: ${OKTA_API_TOKEN:-}

    networks:
      - authsec-net
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:7468/authsec/uflow/health | grep -qx 200"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-authsec}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-kloudone_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - authsec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-authsec} -d ${DB_NAME:-kloudone_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Hydra DB migration (one-shot job) ───────────────────────────────────────
  hydra-migrate:
    image: oryd/hydra:v2.3.0
    container_name: hydra-migrate
    restart: "no"
    command:
      - migrate
      - sql
      - -e
      - --yes
    environment:
      DSN: ${HYDRA_DSN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - authsec-net

  # ── Ory Hydra ───────────────────────────────────────────────────────────────
  hydra:
    image: oryd/hydra:v2.3.0
    container_name: hydra
    restart: unless-stopped
    command:
      - serve
      - all
      - --dev
    environment:
      DSN: ${HYDRA_DSN}
      # login/consent/logout/error URLs point to the authsec hmgr module
      URLS_SELF_ISSUER: ${HYDRA_PUBLIC_URL:-http://localhost:4444}
      URLS_SELF_PUBLIC: ${HYDRA_PUBLIC_URL:-http://localhost:4444}
      URLS_LOGIN: ${BASE_URL:-http://localhost}/authsec/hmgr/login
      URLS_CONSENT: ${BASE_URL:-http://localhost}/authsec/hmgr/consent
      URLS_LOGOUT: ${BASE_URL:-http://localhost}/authsec/hmgr/logout
      URLS_ERROR: ${BASE_URL:-http://localhost}/authsec/hmgr/error
      OAUTH2_PKCE_ENFORCED: "true"
      OAUTH2_PKCE_ENFORCED_FOR_PUBLIC_CLIENTS: "true"
      OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES: public
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: "*"
      SERVE_PUBLIC_CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      SERVE_PUBLIC_CORS_ALLOWED_HEADERS: "Authorization,Content-Type,X-Requested-With,Accept,Origin"
      SERVE_PUBLIC_CORS_ALLOW_CREDENTIALS: "true"
      SERVE_COOKIES_SAME_SITE_MODE: Lax
      LOG_LEVEL: info
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM}
      SECRETS_COOKIE: ${HYDRA_SECRETS_COOKIE}
    ports:
      - "127.0.0.1:4444:4444"
      - "127.0.0.1:4445:4445"
    depends_on:
      postgres:
        condition: service_healthy
      hydra-migrate:
        condition: service_completed_successfully
    networks:
      - authsec-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4444/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - authsec-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HashiCorp Vault ──────────────────────────────────────────────────────────
  # Runs in dev mode: auto-initialised, never sealed, root token = VAULT_TOKEN.
  # Dev mode uses in-memory storage — secret values are lost on container
  # restart and must be re-entered. For persistent secrets in production, swap
  # the command for `server -config=/vault/config/vault.hcl`, mount the config
  # and a named volume, and handle init + unseal manually (see TROUBLESHOOTING).
  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    restart: unless-stopped
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      - authsec-net
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Vault init (one-shot) ─────────────────────────────────────────────────
  # Enables the kv-v2 secrets engine at path "secret/" that authsec uses to
  # store OIDC provider credentials (Google, Microsoft, GitHub, etc.).
  vault-init:
    image: hashicorp/vault:1.17
    container_name: vault-init
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    command:
      - sh
      - -c
      - vault secrets enable -path=secret kv-v2; vault secrets list | grep -q secret/
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - authsec-net

  # ── UI (frontend — all user-facing routes and API calls go through here) ─────
  ui:
    image: docker-repo-public.authsec.ai/authsec-ui:latest
    container_name: ui
    restart: unless-stopped
    environment:
      VITE_API_URL: ${BASE_URL:-http://localhost}
    networks:
      - authsec-net

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for TLS:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      authsec:
        condition: service_healthy
      ui:
        condition: service_started
    networks:
      - authsec-net

networks:
  authsec-net:
    driver: bridge

volumes:
  postgres-data:
