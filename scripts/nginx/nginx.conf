events {
    worker_connections 1024;
}

http {
    client_max_body_size 50m;

    proxy_connect_timeout 300;
    proxy_read_timeout    300;
    proxy_send_timeout    300;

    # ── Common proxy headers ────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── HTTP (local dev / certbot ACME challenge) ───────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt / certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Uncomment to force HTTPS in production:
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # ── AuthSec backend — all /authsec/* routes ───────────────────────
        # Covers all merged modules:
        #   /authsec/uflow/*     user-flow (auth, OIDC, JWT, TOTP, WebAuthn)
        #   /authsec/authmgr/*   auth-manager (RBAC, token validation)
        #   /authsec/clientms/*  clients-microservice (OAuth client mgmt)
        #   /authsec/hmgr/*      hydra-service proxy
        #   /authsec/oocmgr/*    OIDC provider config manager
        #   /authsec/sdkmgr/*    SDK manager (AI agent SDK)
        #   /authsec/exsvc/*     external integrations
        #   /authsec/webauthn/*  WebAuthn / passkey flows
        #   /authsec/spire/*     SPIFFE workload identity
        #   /authsec/migration/* DB migration management
        location /authsec/ {
            proxy_pass http://authsec:7468;
        }

        # ── OIDC discovery & JWKS (RFC 8414) — served by authsec ─────────
        location /.well-known/ {
            proxy_pass http://authsec:7468;
        }

        # ── Prometheus metrics ────────────────────────────────────────────
        # Restrict to internal / monitoring systems in production:
        # allow 10.0.0.0/8;
        # deny  all;
        location /metrics {
            proxy_pass http://authsec:7468;
        }

        # ── Hydra public OAuth2 API ───────────────────────────────────────
        # Handles /oauth2/auth, /oauth2/token, /oauth2/revoke, etc.
        location /oauth2/ {
            proxy_pass http://hydra:4444;
        }

        location /userinfo {
            proxy_pass http://hydra:4444;
        }

        # ── Health probe ──────────────────────────────────────────────────
        location /health {
            proxy_pass http://authsec:7468/authsec/uflow/health;
        }

        # ── Frontend UI (catch-all) ───────────────────────────────────────
        # The UI is the entry point for all user-facing routes.
        # It handles routing internally and calls /authsec/* for API requests.
        location / {
            proxy_pass http://ui:3000;
        }
    }

    # ── HTTPS (production) ──────────────────────────────────────────────────
    # Uncomment and set server_name + certificate paths to enable TLS.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #
    #     location /authsec/ { proxy_pass http://authsec:7468; }
    #     location /.well-known/ { proxy_pass http://authsec:7468; }
    #     location /oauth2/ { proxy_pass http://hydra:4444; }
    #     location /userinfo { proxy_pass http://hydra:4444; }
    #     location / { proxy_pass http://ui:3000; }
    # }
}
